<body class="theme-kavkaz">
<a href="#scr-home" class="skip-link">Skip to main content</a>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- Hediye -->
    <g id="i-gift" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3.5" y="8.5" width="17" height="4" rx="1"/>
      <path d="M5 12.5v7a1.5 1.5 0 0 0 1.5 1.5h11a1.5 1.5 0 0 0 1.5-1.5v-7"/>
      <path d="M12 8.5V21"/>
      <path d="M12 8.5c-2.6 0-4.7-1-4.7-2.7C7.3 4.6 8.3 3.6 9.6 3.6c1.7 0 2.4 2.3 2.4 4.9Z"/>
      <path d="M12 8.5c2.6 0 4.7-1 4.7-2.7 0-1.2-1-2.2-2.3-2.2-1.7 0-2.4 2.3-2.4 4.9Z"/>
    </g>
    <!-- Sözlük -->
    <g id="i-book" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15.5H6.5A2.5 2.5 0 0 0 4 21Z"/>
      <path d="M4 18.5V21a0 0 0 0 0 0 0"/>
      <path d="M20 18.5V21H6.5A2.5 2.5 0 0 1 4 18.5"/>
      <path d="M9 8h7M9 11.5h5"/>
    </g>
    <!-- İstatistik -->
    <g id="i-chart" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4v15a1 1 0 0 0 1 1h15"/>
      <path d="M8.5 15.5v-4"/>
      <path d="M13 15.5V7.5"/>
      <path d="M17.5 15.5v-6"/>
    </g>
    <!-- Ayarlar -->
    <g id="i-gear" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3.2"/>
      <path d="M19.4 13.5a7.6 7.6 0 0 0 0-3l2-1.5-2-3.4-2.4.9a7.6 7.6 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.5a7.6 7.6 0 0 0-2.6 1.5l-2.4-.9-2 3.4 2 1.5a7.6 7.6 0 0 0 0 3l-2 1.5 2 3.4 2.4-.9a7.6 7.6 0 0 0 2.6 1.5l.4 2.5h4l.4-2.5a7.6 7.6 0 0 0 2.6-1.5l2.4.9 2-3.4Z"/>
    </g>
    <!-- Bonus (elmas) -->
    <g id="i-gem" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 3.5h10l4 5.5-9 11.5L3 9Z"/>
      <path d="M3 9h18M9.5 3.5 8 9l4 11.5M14.5 3.5 16 9l-4 11.5"/>
    </g>
    <!-- Harf ipucu (ampul) -->
    <g id="i-bulb" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18h6M10 21h4"/>
      <path d="M12 3a6 6 0 0 0-4 10.5c.8.7 1.3 1.5 1.5 2.5h5c.2-1 .7-1.8 1.5-2.5A6 6 0 0 0 12 3Z"/>
    </g>
    <!-- Hedef -->
    <g id="i-target" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="8.5"/>
      <circle cx="12" cy="12" r="5"/>
      <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/>
    </g>
    <!-- Sihirli değnek -->
    <g id="i-wand" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 20 15.5 8.5"/>
      <path d="m15.5 8.5 2-2"/>
      <path d="M19 3v2.4M19 8.6V11M15 7h2.4M20.6 7H23M20.8 3.7l-1.3 1.3M18.5 9.5l-1.3 1.3"/>
    </g>
    <!-- Geri ok -->
    <g id="i-back" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15.5 5 8.5 12l7 7"/>
    </g>
    <!-- Kapat -->
    <g id="i-x" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M6 6l12 12M18 6 6 18"/>
    </g>
    <!-- Kilit -->
    <g id="i-lock" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/>
      <path d="M8 10.5V7.6a4 4 0 0 1 8 0v2.9"/>
      <circle cx="12" cy="15.2" r="1.4" fill="currentColor" stroke="none"/>
    </g>
    <!-- Zil (ses) -->
    <g id="i-bell" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8.5a6 6 0 1 0-12 0c0 5-2 6-2 6h16s-2-1-2-6"/>
      <path d="M10.2 20a2 2 0 0 0 3.6 0"/>
    </g>
    <!-- Nota (müzik) -->
    <g id="i-note" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="7" cy="17.5" r="2.8"/>
      <circle cx="17" cy="15.5" r="2.8"/>
      <path d="M9.8 17.5V6.5l10-2v11"/>
    </g>
    <!-- Yenile / sıfırla -->
    <g id="i-reset" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3.5 12a8.5 8.5 0 1 0 2.5-6L3.5 8.5"/>
      <path d="M3.5 3.5v5h5"/>
    </g>
  </defs>
</svg>

<div id="photo">
  <div class="ph" data-t="kavkaz"></div>
  <div class="ph" data-t="night"></div>
  <div class="ph" data-t="forest"></div>
  <div class="ph" data-t="autumn"></div>
  <div class="ph" data-t="winter"></div>
</div>
<div id="bg">
  <div class="sun"></div>
  <svg viewBox="0 0 900 400" preserveAspectRatio="none">
    <polygon points="0,400 0,240 120,120 210,210 330,70 450,220 560,110 680,230 790,140 900,260 900,400" fill="var(--mtn1)" opacity=".8"/>
    <polygon points="120,120 90,150 150,150" fill="#ffffff" opacity=".7"/>
    <polygon points="330,70 295,110 365,110" fill="#ffffff" opacity=".8"/>
    <polygon points="560,110 528,146 592,146" fill="#ffffff" opacity=".7"/>
    <polygon points="0,400 0,300 150,200 300,310 430,190 580,320 720,220 900,330 900,400" fill="var(--mtn2)" opacity=".92"/>
    <polygon points="0,400 0,350 200,280 400,370 600,290 780,380 900,320 900,400" fill="var(--mtn3)"/>
  </svg>
</div>
<canvas id="gl"></canvas>
<canvas id="fx"></canvas>

<main>
  <!-- HOME -->
  <section class="screen st" id="scr-home">
    <svg class="tower" viewBox="0 0 64 88" aria-hidden="true">
      <rect x="24" y="2"  width="16" height="4"  rx="1.4" fill="var(--gold)"/>
      <rect x="20" y="8"  width="24" height="5"  rx="1.6" fill="var(--gold)"/>
      <rect x="16" y="15" width="32" height="6"  rx="2"   fill="var(--gold)"/>
      <path d="M20 24 L44 24 L52 86 Q52 88 50 88 L14 88 Q12 88 12 86 Z" fill="#f7f1de"/>
      <path d="M28 44 h8 v14 a4 4 0 0 1-8 0 Z" fill="#2b2415"/>
      <rect x="30" y="30" width="4" height="7" rx="2" fill="#2b2415"/>
    </svg>
    <div class="logo" id="logo">Дош</div>
    <div class="subtitle">Нохчийн дош</div>
    <div class="deco" aria-hidden="true">◆ ◆</div>
    <div class="hero glass">
      <div class="hero-top">
        <span class="coins-chip">🪙 <span class="c" id="home-coins">0</span></span>
        <span class="coins-chip">⭐ <span class="c" id="home-stars">0</span></span>
      </div>
      <div class="progressbar"><i id="home-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="İlerleme"></i></div>
      <div class="home-progress" id="home-progress" aria-live="polite"></div>
      <button class="btn" id="btn-start">ДӀадоладе ▶</button>
      <button class="btn small ghost btn-daily" id="btn-daily">📅 Денна дош <span class="flame" id="daily-streak"></span></button>
    </div>
    <div class="dock">
      <button class="icon-btn glass" id="btn-gift" title="+100"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-gift"/></svg></span><span class="lb">Денна</span></button>
      <button class="icon-btn glass" id="btn-dict"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-book"/></svg></span><span class="lb">Дошам</span></button>
      <button class="icon-btn glass" id="btn-stats"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-chart"/></svg></span><span class="lb">Статистика</span></button>
      <button class="icon-btn glass" id="btn-timeattack" aria-label="Zamana Karşı"><span class="ic" aria-hidden="true">⏱</span><span class="lb">⏱ 60s</span></button>
      <button class="icon-btn glass" id="btn-chain" aria-label="Kelime Zinciri"><span class="ic" aria-hidden="true">🔗</span><span class="lb">ЗӀенг</span></button>
      <button class="icon-btn glass" id="btn-settings"><span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-gear"/></svg></span><span class="lb">Нисдарш</span></button>
    </div>
  </section>

  <!-- MAP -->
  <section class="screen" id="scr-map">
    <div class="topbar">
      <button class="rbtn" id="map-back" aria-label="Geri"><svg class="ri" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-back"/></svg></button>
      <div class="title">ТӀегӀанийн карта</div>
      <div class="coins-chip">🪙 <span class="c" id="map-coins">0</span></div>
    </div>
    <div class="map-scroll" id="map-scroll"></div>
  </section>

  <!-- GAME -->
  <section class="screen" id="scr-game">
    <div class="gtop">
      <button class="rbtn" id="game-back" aria-label="Geri"><svg class="ri" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-back"/></svg></button>
      <div class="lvl"><small>ТӀЕГӀА</small><span id="lvl-num"></span><span class="lvl-progress" id="lvl-progress" aria-live="polite"></span></div>
      <div class="coins-chip">🪙 <span class="c" id="game-coins">0</span></div>
      <button class="rbtn" id="game-settings" aria-label="Ayarlar"><svg class="ri" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-gear"/></svg></button>
    </div>
    <div id="grid-wrap"><div id="grid"></div></div>
    <div id="info-strip"></div>
    <div class="toolrow">
      <button class="tool" id="bonus-chest" title="Бонус дешнаш" aria-label="Бонус дешнаш">
        <span class="tool-ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-gem"/></svg></span><span class="tool-label">Бонус <br>дешнаш</span><span id="bonus-count">0</span>
      </button>
      <button class="tool" id="hint-letter" title="ХӀарф хьахо" aria-label="ХӀарф хьахо">
        <span class="tool-ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-bulb"/></svg></span><span class="tool-label">ХӀарф <br>хьахо</span><span class="price">25 🪙</span>
      </button>
      <button class="tool" id="hint-target" title="ХӀан хьахо" aria-label="ХӀан хьахо">
        <span class="tool-ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-target"/></svg></span><span class="tool-label">ХӀан <br>хьахо</span><span class="price">35 🪙</span>
      </button>
      <button class="tool" id="hint-wand" title="Хьехаман тай" aria-label="Хьехаман тай">
        <span class="tool-ic" aria-hidden="true"><svg viewBox="0 0 24 24"><use href="#i-wand"/></svg></span><span class="tool-label">Хьехаман <br>тай</span><span class="price">60 🪙</span>
      </button>
    </div>
    <div id="preview"></div>
    <div id="wheel-zone"><div id="wheel"><svg></svg><button id="shuffle" aria-label="Karıştır"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 6h4l10 12h6"/><path d="M18 4l4 2-4 2"/><path d="M2 18h4l3-3.6"/><path d="M14 8.5 16 6h6"/><path d="M18 20l4-2-4-2"/></svg></button></div></div>
  </section>
</main>

<div id="veil" role="dialog" aria-hidden="true"><div class="panel glass" id="panel" tabindex="-1"></div></div>
<div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="banner" role="status" aria-live="polite"></div>
<div id="splash">
  <svg class="tower" viewBox="0 0 64 88" aria-hidden="true">
    <rect x="24" y="2"  width="16" height="4"  rx="1.4" fill="#f2b53d"/>
    <rect x="20" y="8"  width="24" height="5"  rx="1.6" fill="#f2b53d"/>
    <rect x="16" y="15" width="32" height="6"  rx="2"   fill="#f2b53d"/>
    <path d="M20 24 L44 24 L52 86 Q52 88 50 88 L14 88 Q12 88 12 86 Z" fill="#f7f1de"/>
    <path d="M28 44 h8 v14 a4 4 0 0 1-8 0 Z" fill="#2b2415"/>
    <rect x="30" y="30" width="4" height="7" rx="2" fill="#2b2415"/>
  </svg>
  <div class="slogo">Дош</div>
  <div class="ssub">нохчийн дош</div>
  <div class="sbar"><i></i></div>
  <div class="sparticles" aria-hidden="true"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
